name: Run Tests

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v2

    - name: Set up Python
      uses: actions/setup-python@v2
      with:
        python-version: '3.13'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run tests
      run: pytest test_full_app.py test_claude_v2.py -v --html=report.html --self-contained-html

    - name: Upload report
      if: always()
      uses: actions/upload-artifact@v2
      with:
        name: test-report
        path: report.html