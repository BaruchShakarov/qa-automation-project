<!DOCTYPE html>
<html>
<head>
    <title>QA Test Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        h1 {
            color: white;
            margin-bottom: 30px;
            text-align: center;
            font-size: 32px;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: white;
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            text-align: center;
        }

        .stat-card h2 {
            color: #667eea;
            font-size: 14px;
            margin-bottom: 15px;
            text-transform: uppercase;
        }

        .stat-card .number {
            font-size: 48px;
            font-weight: bold;
            color: #333;
        }

        .passed {
            border-top: 4px solid #28a745;
        }

        .failed {
            border-top: 4px solid #dc3545;
        }

        .total {
            border-top: 4px solid #667eea;
        }

        .chart {
            background: white;
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            margin-bottom: 30px;
        }

        .chart h2 {
            color: #333;
            margin-bottom: 20px;
        }

        .progress-bar {
            width: 100%;
            height: 40px;
            background: #e9ecef;
            border-radius: 8px;
            overflow: hidden;
            display: flex;
            margin-bottom: 20px;
        }

        .progress-passed {
            background: #28a745;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
        }

        .progress-failed {
            background: #dc3545;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
        }

        .test-list {
            background: white;
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        .test-list h2 {
            color: #333;
            margin-bottom: 20px;
        }

        .test-item {
            padding: 15px;
            border-bottom: 1px solid #e9ecef;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .test-item:last-child {
            border-bottom: none;
        }

        .test-name {
            flex: 1;
            color: #333;
        }

        .test-status {
            padding: 8px 15px;
            border-radius: 6px;
            font-weight: bold;
            font-size: 12px;
        }

        .status-passed {
            background: #d4edda;
            color: #155724;
        }

        .status-failed {
            background: #f8d7da;
            color: #721c24;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🧪 QA Test Dashboard</h1>

        <div class="stats">
            <div class="stat-card total">
                <h2>Total Tests</h2>
                <div class="number" id="total">0</div>
            </div>

            <div class="stat-card passed">
                <h2>Passed</h2>
                <div class="number" id="passed">0</div>
            </div>

            <div class="stat-card failed">
                <h2>Failed</h2>
                <div class="number" id="failed">0</div>
            </div>
        </div>

        <div class="chart">
            <h2>Test Results Breakdown</h2>
            <div class="progress-bar">
                <div class="progress-passed" id="progress-passed" style="width: 0%">
                    <span id="progress-passed-text">0%</span>
                </div>
                <div class="progress-failed" id="progress-failed" style="width: 0%">
                    <span id="progress-failed-text">0%</span>
                </div>
            </div>
            <div style="display: flex; gap: 20px; margin-top: 20px;">
                <div style="flex: 1; padding: 15px; background: #d4edda; border-radius: 8px;">
                    <strong style="color: #155724;">✓ Passed: <span id="pass-count">0</span></strong>
                </div>
                <div style="flex: 1; padding: 15px; background: #f8d7da; border-radius: 8px;">
                    <strong style="color: #721c24;">✗ Failed: <span id="fail-count">0</span></strong>
                </div>
            </div>
        </div>

        <div class="test-list">
            <h2>Test Results</h2>
            <div id="tests-container"></div>
        </div>
    </div>

    <script>
        async function loadResults() {
            const response = await fetch('/api/results');
            const data = await response.json();

            // Update stats
            document.getElementById('total').textContent = data.total;
            document.getElementById('passed').textContent = data.passed;
            document.getElementById('failed').textContent = data.failed;

            // Update progress
            const passPercent = data.total > 0 ? (data.passed / data.total * 100) : 0;
            const failPercent = 100 - passPercent;

            document.getElementById('progress-passed').style.width = passPercent + '%';
            document.getElementById('progress-failed').style.width = failPercent + '%';
            document.getElementById('progress-passed-text').textContent = Math.round(passPercent) + '%';
            document.getElementById('progress-failed-text').textContent = Math.round(failPercent) + '%';
            document.getElementById('pass-count').textContent = data.passed;
            document.getElementById('fail-count').textContent = data.failed;

            // Render tests
            const container = document.getElementById('tests-container');
container.innerHTML = '';  // הוסף את השורה הזאת!

data.tests.forEach(test => {
                const div = document.createElement('div');
                div.className = 'test-item';
                div.innerHTML = `
                    <div class="test-name">${test.name || 'Unknown Test'}</div>
                    <div class="test-status ${test.status === 'passed' ? 'status-passed' : 'status-failed'}">
                        ${test.status.toUpperCase()}
                    </div>
                `;
                container.appendChild(div);
            });
        }

        loadResults();
        setInterval(loadResults, 5000);  // Refresh every 5 seconds
    </script>
</body>
</html>
